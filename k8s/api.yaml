apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mlops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: pipeline-prod-aiops-api:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CLICKHOUSE_HOST
          value: "clickhouse"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: mlops
spec:
  selector:
    app: api
  ports:
  - port: 8000
  type: NodePort