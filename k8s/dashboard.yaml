apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: pipeline-prod-aiops-dashboard:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CLICKHOUSE_HOST
          value: "clickhouse"
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: mlops
spec:
  selector:
    app: dashboard
  ports:
  - port: 8501
  type: NodePort