name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Start all services
        run: |
          docker compose up -d
          # Wait for ClickHouse and Kafka to be healthy
          for i in $(seq 1 30); do
            if docker compose exec clickhouse clickhouse-client --query "SELECT 1" 2>/dev/null; then
              echo "ClickHouse is ready"
              break
            fi
            echo "Waiting for ClickHouse..."
            sleep 3
          done
          for i in $(seq 1 30); do
            if docker compose exec kafka kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null; then
              echo "Kafka is ready"
              break
            fi
            echo "Waiting for Kafka..."
            sleep 3
          done
      - name: Run tests
        run: |
          pytest tests/ -v
      - name: Stop services
        if: always()
        run: |
          docker compose down -v