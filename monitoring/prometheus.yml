global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:8123']
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']